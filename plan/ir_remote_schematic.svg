  <!-- Notes -->
  <rect x="20" y="600" width="550" height="270" fill="#fafafa" stroke="#999" stroke-width="1" rx="5"/>
  <text x="30" y="620" text-anchor="start" font-size="14" font-weight="bold" fill="#333">WIRING  NOTES  &amp;  BOM</text>
  <text x="30" y="638" text-anchor="start" font-size="11" font-weight="bold" fill="#333">Pin Connections on TM4C123GXL LaunchPad:</text>
  <text x="30" y="654" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  PB6 (T0CCP0) = Header J2, Pin 7  →  TSOP13438 OUT (pin 1)</text>
  <text x="30" y="670" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  PB7 (T0CCP1) = Header J2, Pin 6  →  R3 (1kΩ) → Q1 Base</text>
  <text x="30" y="686" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  PA0 (U0RX)   = Header J1, Pin 3  →  USB Virtual COM (built-in)</text>
  <text x="30" y="702" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  PA1 (U0TX)   = Header J1, Pin 4  →  USB Virtual COM (built-in)</text>
  <text x="30" y="718" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  +5V           = Header J3, Pin 1  →  R1→TSOP VS, R2→LED chain</text>
  <text x="30" y="734" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  GND           = Header J3, Pin 2  →  TSOP GND, Q1 Emitter, R4</text>
  <text x="30" y="750" text-anchor="start" font-size="11" font-weight="normal" fill="#333"></text>
  <text x="30" y="766" text-anchor="start" font-size="11" font-weight="bold" fill="#333">Bill of Materials:</text>
  <text x="30" y="782" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  R1 = 100Ω ¼W       (TSOP supply filter)</text>
  <text x="30" y="798" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  R2 = 47Ω  ¼W       (LED current limit: I≈50mA)</text>
  <text x="30" y="814" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  R3 = 1kΩ  ¼W       (Base drive: I≈2.6mA)</text>
  <text x="30" y="830" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  R4 = 10kΩ ¼W       (Base pull-down: keeps Q1 OFF during reset)</text>
  <text x="30" y="846" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  C1 = 4.7µF 16V electrolytic  (TSOP supply bypass, + to VS)</text>
  <text x="30" y="862" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  D1 = IR333-A IR LED  (940nm, long lead = Anode)</text>
  <text x="30" y="878" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  Q1 = 2N3904 NPN BJT  (TO-92, flat side: E-B-C left to right)</text>
  <text x="30" y="878" text-anchor="start" font-size="11" font-weight="normal" fill="#555">  U2 = TSOP13438       (38kHz IR receiver, pin 1=OUT, 2=GND, 3=VS)</text>
  <text x="835" y="500" text-anchor="start" font-size="10" font-weight="normal" fill="#cc0000">I_LED ≈ 50 mA</text>
  <text x="835" y="515" text-anchor="start" font-size="9" font-weight="normal" fill="#999">(5V - 1.2V - 0.2V) / 47Ω</text>
  <text x="735" y="185" text-anchor="middle" font-size="9" font-weight="normal" fill="#0066cc">IR signal (inverted,</text>
  <text x="735" y="196" text-anchor="middle" font-size="9" font-weight="normal" fill="#0066cc">active-low pulses)</text>
</svg>
